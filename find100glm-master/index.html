<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字大挑战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🎯 数字大挑战</h1>
        
        <div class="game-info">
            <div class="current-number">当前需要点击: <span id="currentNum">1</span></div>
            <div class="score">进度: <span id="progress">0</span> / <span id="total">0</span></div>
            <div class="timer">⏱️ <span id="timer">5.0</span>s</div>
            <button class="btn-eye" id="eyeModeBtn" title="切换护眼模式">👁️ 护眼</button>
        </div>
 
        <div class="game-area">
            <svg id="gameSvg"></svg>
            <div class="start-overlay" id="startOverlay">
                <button class="btn-start-large" id="startBtn">开始游戏</button>
            </div>
        </div>
 
        <div class="controls">
            <button class="btn-reset" id="resetBtn">重新开始</button>
        </div>
 
        <div class="instructions">
            💡 游戏规则：按数字顺序（1, 2, 3...）点击矩形被切割后形成的各个区域，全部点击即可通关！
        </div>
    </div>
 
    <!-- 通关弹窗 -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 老婆我爱你！</h2>
            <div class="iq-rank">
                <span class="iq-icon" id="iqIcon">👑</span>
                <span class="iq-level" id="iqLevel">智商超绝</span>
            </div>
            <div class="stats">
                <p>总用时: <span id="finalTime">0</span> 秒</p>
                <p>点击次数: <span id="finalClicks">0</span> 次</p>
                <p>错误次数: <span id="finalErrors">0</span> 次</p>
            </div>
            <button class="btn-start" onclick="resetGame()">再玩一次</button>
        </div>
    </div>

    <!-- 失败弹窗 -->
    <div class="modal" id="loseModal">
        <div class="modal-content">
            <h2>😢 游戏失败！</h2>
            <div class="stats">
                <p>完成进度: <span id="loseProgress">0</span> / <span id="loseTotal">100</span></p>
                <p>用时: <span id="loseTime">0</span> 秒</p>
            </div>
            <button class="btn-start" onclick="resetGame()">再试一次</button>
        </div>
    </div>
  
    <script src="script.js"></script>
</body>
</html>
